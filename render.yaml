services:
  # Web Service (API do Middleware)
  - type: web
    name: interoperabilidade-middleware
    env: python
    rootDir: Middleware
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: middleware-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: "*"
      - key: SHADOW_PERSIST_READS
        value: "true"

databases:
  # Banco de Dados PostgreSQL Gratuito no Render
  - name: middleware-db
    plan: free
    databaseName: middleware
    user: postgres
